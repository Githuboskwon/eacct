# eAcct 프론트엔드 (Vue CLI 5 빌드 결과) Nginx 서빙 설정
# 배치: /etc/nginx/sites-available/eacct → sites-enabled 로 심볼릭 링크
#       sudo ln -sf /etc/nginx/sites-available/eacct /etc/nginx/sites-enabled/eacct
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 19050;
    server_name _;                 # 도메인이 있으면 eleceas.iljin.co.kr 등으로 지정

    # Vue 빌드 산출물 경로 (npm run build → dist/)
    root /data/apps/ije-eacct/ije-eacct-front/dist;
    index index.html;

    # 업로드 파일 크기 (백엔드 multipart 100MB 와 정합)
    client_max_body_size 100M;

    # ── SPA history 모드 (필수) ──
    # 새로고침/직접 URL 접근 시 index.html 로 폴백하지 않으면 404 발생
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산 캐시 (해시 파일명이라 장기 캐시 안전)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── (선택) 백엔드 API 리버스 프록시 ──
    # 프론트와 백엔드를 같은 출처(포트 19050)로 묶고 싶을 때 사용.
    # 이 경우 .env.production 의 VUE_APP_API_URL 을 /api 같은 상대경로로 바꾸고 아래 주석 해제.
    # location /api/ {
    #     proxy_pass http://127.0.0.1:19500;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
